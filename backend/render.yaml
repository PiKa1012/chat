services:
  - type: web
    name: my-chat-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_URL
        fromDatabase: false
      - key: TURSO_TOKEN
        fromDatabase: false
      - key: JWT_SECRET
        generateValue: true